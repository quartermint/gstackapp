name = "mission-control-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment variables (override in wrangler.toml or via secrets)
[vars]
HUB_URL = "http://100.x.x.x:3000"  # Replace with actual Tailscale IP

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-kv-id"  # Replace with actual KV namespace ID after creation
# preview_id = "placeholder-preview-kv-id"  # Uncomment for local dev

# Production environment overrides
[env.production]
vars = { HUB_URL = "http://100.x.x.x:3000" }  # Replace with production Tailscale IP
